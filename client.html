<!DOCTYPE html><html><head><meta charset="UTF-8"><title>ChatRealTime Client</title><style>body{background:#111;color:#fff;font-family:sans-serif;padding:20px}#messages{height:300px;overflow-y:auto;border:1px solid #333;padding:10px;margin-bottom:10px;border-radius:8px}input{padding:10px;background:#222;border:1px solid #555;color:#fff;border-radius:6px;width:300px}button{padding:10px 20px;background:#daa520;color:#000;border:none;border-radius:6px;cursor:pointer}</style></head><body><h1>ChatRealTime</h1><div id="messages"></div><input id="input" placeholder="Digite..." /><button onclick="send()">Enviar</button><script src="/socket.io/socket.io.js"></script><script>const socket=io();const input=document.getElementById("input");const msgs=document.getElementById("messages");socket.on("message",(data)=>{const d=document.createElement("div");d.textContent=data.text;msgs.appendChild(d);msgs.scrollTop=msgs.scrollHeight});function send(){if(!input.value)return;socket.emit("message",{text:input.value});input.value=""}</script></body></html>
